name: Deploy to GitHub Pages

# Builds the Vite SPA (frontend/) and publishes dist/ — which includes the
# DuckDB-Wasm Parquet bundle copied in via the public/data symlink — to Pages.
# The site lives at the project subpath sigfried.github.io/vs-hub/ (vite base).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      # Copy the Parquet bundle into dist/data as REAL files. Locally,
      # frontend/public/data is a symlink to ../../data/public and Vite follows
      # it; on the CI runner that symlink isn't reliably dereferenced, so the
      # data 404s. Copy explicitly from the repo's tracked data/public/ instead.
      - name: Copy data bundle into dist
        run: |
          rm -rf dist/data
          mkdir -p dist/data
          cp ../data/public/*.parquet dist/data/
          ls -lh dist/data

      # SPA fallback: GitHub Pages serves 404.html for unmatched paths. Making
      # it a copy of index.html lets React Router handle deep links / refreshes
      # (e.g. /vs-hub/cset-comparison?codeset_ids=...).
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
